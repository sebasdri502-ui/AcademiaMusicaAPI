<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Academia de Música - IUE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #121214;
            color: #e1e1e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar-custom {
            background-color: #19191c;
            border-bottom: 2px solid #00b37e;
        }
        .card-custom {
            background-color: #19191c;
            border: 1px solid #29292e;
            border-radius: 12px;
        }
        .form-control-custom {
            background-color: #202024;
            border: 1px solid #29292e;
            color: #fff;
        }
        .form-control-custom:focus {
            background-color: #202024;
            border-color: #00b37e;
            color: #fff;
            box-shadow: 0 0 0 0.25rem rgba(0, 179, 126, 0.25);
        }
        .table-custom {
            color: #e1e1e6;
        }
        .table-custom th {
            background-color: #202024;
            color: #00b37e;
            border-color: #29292e;
        }
        .table-custom td {
            border-color: #29292e;
            vertical-align: middle;
        }
        .btn-success-custom {
            background-color: #00b37e;
            border: none;
            color: white;
        }
        .btn-success-custom:hover {
            background-color: #00875f;
            color: white;
        }
        .badge-active {
            background-color: rgba(0, 179, 126, 0.1);
            color: #00b37e;
            border: 1px solid #00b37e;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-custom navbar-dark py-3 mb-5 shadow">
        <div class="container">
            <span class="navbar-brand mb-0 h1 fs-4 fw-bold text-uppercase tracking-wide">
                <i class="fa-solid fa-music text-success me-2"></i> Control de Academia
            </span>
            <span class="badge bg-secondary px-3 py-2 fs-6">Sistemas IUE</span>
        </div>
    </nav>

    <div class="container">
        <div class="row g-4">
            
            <div class="col-lg-4">
                <div class="card card-custom shadow-lg p-3">
                    <div class="card-body">
                        <h4 class="fw-bold mb-4" id="formTitle" style="color: #00b37e;">
                            <i class="fa-solid fa-user-plus me-2"></i>Registrar Alumno
                        </h4>
                        <form id="estudianteForm">
                            <input type="hidden" id="estudianteId">
                            
                            <div class="mb-3">
                                <label class="form-label text-secondary fw-semibold">Nombre Completo</label>
                                <input type="text" id="nombre" class="form-control form-control-custom py-2" placeholder="Ej. Sebastián Morales" required>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label text-secondary fw-semibold">Instrumento Principal</label>
                                <input type="text" id="instrumento" class="form-control form-control-custom py-2" placeholder="Ej. Guitarra Electrónica" required>
                            </div>
                            
                            <div class="d-grid gap-2">
                                <button type="submit" id="btnGuardar" class="btn btn-success-custom py-2 fw-bold">
                                    <i class="fa-solid fa-floppy-disk me-2"></i>Guardar en Base de Datos
                                </button>
                                <button type="button" id="btnCancelar" class="btn btn-outline-secondary py-2 fw-bold d-none" onclick="resetearFormulario()">
                                    Cancelar Edición
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card card-custom shadow-lg p-3">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h4 class="fw-bold m-0 text-white">
                                <i class="fa-solid fa-list-check text-success me-2"></i>Registros Actuales
                            </h4>
                            <button class="btn btn-sm btn-outline-light" onclick="cargarEstudiantes()">
                                <i class="fa-solid fa-rotate me-1"></i> Sincronizar Base de Datos
                            </button>
                        </div>
                        
                        <div class="table-responsive">
                            <table class="table table-custom align-middle">
                                <thead>
                                    <tr>
                                        <th style="width: 10%">ID</th>
                                        <th style="width: 40%">Estudiante</th>
                                        <th style="width: 30%">Instrumento</th>
                                        <th style="width: 20%" class="text-center">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="tablaEstudiantes">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const API_URL = '/api/Estudiantes';

        document.addEventListener('DOMContentLoaded', cargarEstudiantes);

        async function cargarEstudiantes() {
            try {
                const res = await fetch(API_URL);
                const estudiantes = await res.json();
                const tbody = document.getElementById('tablaEstudiantes');
                tbody.innerHTML = '';

                estudiantes.forEach(est => {
                    // Mapeo flexible para leer propiedades sin importar la serialización del backend
                    const id = est.id !== undefined ? est.id : est.Id;
                    const nombre = est.nombre !== undefined ? est.nombre : est.Nombre;
                    const instrumento = est.instrumento !== undefined ? est.instrumento : est.Instrumento;

                    tbody.innerHTML += `
                        <tr>
                            <td class="fw-bold text-secondary">${id}</td>
                            <td class="text-white fw-semibold">${nombre}</td>
                            <td><span class="badge badge-active py-2 px-3"><i class="fa-solid fa-music me-1"></i> ${instrumento}</span></td>
                            <td class="text-center">
                                <button class="btn btn-warning btn-sm me-1" onclick="prepararEditar(${id}, '${nombre}', '${instrumento}')" title="Editar">
                                    <i class="fa-solid fa-pen-to-square text-dark"></i>
                                </button>
                                <button class="btn btn-danger btn-sm" onclick="eliminarEstudiante(${id})" title="Eliminar">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error("Error al cargar estudiantes:", error);
            }
        }

        document.getElementById('estudianteForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('estudianteId').value;
            const nombre = document.getElementById('nombre').value;
            const instrumento = document.getElementById('instrumento').value;

            // El estándar estricto de serialización de .NET espera propiedades en minúsculas (camelCase)
            const estudiante = { 
                nombre: nombre, 
                instrumento: instrumento, 
                activo: true 
            };

            try {
                if (id) {
                    estudiante.id = parseInt(id);
                    await fetch(`${API_URL}/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(estudiante)
                    });
                } else {
                    await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(estudiante)
                    });
                }
            } catch (error) {
                console.error("Error al procesar la solicitud:", error);
            }

            resetearFormulario();
            cargarEstudiantes();
        });

        function prepararEditar(id, nombre, instrumento) {
            document.getElementById('estudianteId').value = id;
            document.getElementById('nombre').value = nombre;
            document.getElementById('instrumento').value = instrumento;
            document.getElementById('formTitle').innerHTML = '<i class="fa-solid fa-pen-to-square me-2"></i>Editar Alumno';
            document.getElementById('btnGuardar').className = 'btn btn-warning py-2 fw-bold text-dark';
            document.getElementById('btnGuardar').innerText = 'Actualizar Datos';
            document.getElementById('btnCancelar').classList.remove('d-none');
        }

        async function eliminarEstudiante(id) {
            if (confirm('¿Deseas eliminar este registro permanentemente de la base de datos?')) {
                try {
                    await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                } catch (error) {
                    console.error("Error al eliminar:", error);
                }
                cargarEstudiantes();
            }
        }

        function resetearFormulario() {
            document.getElementById('estudianteId').value = '';
            document.getElementById('estudianteForm').reset();
            document.getElementById('formTitle').innerHTML = '<i class="fa-solid fa-user-plus me-2"></i>Registrar Alumno';
            document.getElementById('btnGuardar').className = 'btn btn-success-custom py-2 fw-bold';
            document.getElementById('btnGuardar').innerText = 'Guardar en Base de Datos';
            document.getElementById('btnCancelar').classList.add('d-none');
        }
    </script>
</body>
</html>
